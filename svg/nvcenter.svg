<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <style>
    .bond     { stroke: #7c5cff; stroke-width: 1.5; opacity: 0.6; }
    .C        { fill: #29d8c5; }
    .N        { fill: #ffb84d; }
    .V        { fill: none; stroke: #ff5cb0; stroke-width: 2; stroke-dasharray: 3 2; }
    .green    { stroke: #5dd95c; stroke-width: 2; }
    .red      { stroke: #ff5cb0; stroke-width: 2; opacity: 0.8; }
    .arrow    { stroke: #ff5cb0; stroke-width: 2.5; fill: none; }
    .lbl      { fill: #e6ecff; font-family: -apple-system, "Segoe UI", sans-serif; font-size: 12px; }
    .dim      { fill: #8b97c2; font-size: 10px; }
  </style>

  <!-- Diamond lattice (hexagonal grid hint) -->
  <g transform="translate(120, 100)">
    <!-- Six surrounding C atoms in hexagon around center -->
    <line x1="0" y1="0"  x2="60" y2="0"  class="bond"/>
    <line x1="60" y1="0" x2="90" y2="52" class="bond"/>
    <line x1="90" y1="52" x2="60" y2="104" class="bond"/>
    <line x1="60" y1="104" x2="0" y2="104" class="bond"/>
    <line x1="0" y1="104" x2="-30" y2="52" class="bond"/>
    <line x1="-30" y1="52" x2="0" y2="0" class="bond"/>

    <!-- Bond from N to V (center pair) -->
    <line x1="0" y1="52" x2="60" y2="52" stroke="#ff5cb0" stroke-width="2"/>

    <!-- Carbon atoms (cyan) -->
    <circle cx="0" cy="0"  r="8" class="C"/>
    <circle cx="60" cy="0" r="8" class="C"/>
    <circle cx="90" cy="52" r="8" class="C"/>
    <circle cx="60" cy="104" r="8" class="C"/>
    <circle cx="0" cy="104" r="8" class="C"/>
    <circle cx="-30" cy="52" r="8" class="C"/>

    <!-- N atom (orange) at center-left -->
    <circle cx="0" cy="52" r="10" class="N"/>
    <text x="-6" y="56" class="lbl" style="font-size:11px; fill:#0b1020; font-weight:700">N</text>

    <!-- V (vacancy, dashed circle) at center-right -->
    <circle cx="60" cy="52" r="10" class="V"/>
    <text x="55" y="56" class="lbl" style="fill:#ff5cb0; font-weight:700">V</text>

    <text x="-30" y="-12" class="dim">diamond C lattice</text>
  </g>

  <!-- Spin arrow next to NV -->
  <g transform="translate(230, 130)">
    <text x="0" y="0" class="lbl">electron spin (mₛ)</text>
    <path d="M 30 16 L 30 50" class="arrow"/>
    <path d="M 30 50 L 26 44 M 30 50 L 34 44" class="arrow"/>
    <text x="40" y="40" class="dim">|0⟩, |1⟩</text>
  </g>

  <!-- Green laser (top): 532 nm initialize/readout -->
  <path d="M 320 30 L 200 130" class="green"/>
  <path d="M 200 130 L 206 124 M 200 130 L 208 132" class="green"/>
  <text x="290" y="22" class="dim">532 nm green laser</text>

  <!-- Red fluorescence out -->
  <path d="M 210 140 L 340 200" class="red"/>
  <path d="M 210 140 L 340 215" class="red" opacity="0.5"/>
  <text x="295" y="225" class="dim">red fluorescence</text>

  <!-- Microwave drive -->
  <path d="M 80 240 Q 90 230 100 240 Q 110 250 120 240" stroke="#ffb84d" stroke-width="1.5" fill="none"/>
  <text x="40" y="244" class="dim">MW</text>

  <!-- Caption -->
  <text x="60" y="285" class="dim">NV defect: N substitutional + adjacent C vacancy • room temperature operation</text>
</svg>
